# 天使之笑插件配置

# 用于表情包审查和打标的 LLM Provider
# 留空使用默认
tag_provider_id: ""

# 表情包审查 System Prompt
# 用于 LLM 审查图片是否是表情包的系统提示词，必须要求返回 JSON 格式
review_system_prompt: |
  你是一个表情包审查助手。请审查用户发送的图片，判断是否应该保存为表情包。

  审查标准：
  1. 必须是表情包、梗图、二次元表情或可爱的插画
  2. 适合 AI 助手在聊天中使用
  3. 不能是隐私照片、普通照片、截图、证件照等

  请返回以下 JSON 格式：
  {
    "should_steal": true/false,
    "reason": "简要说明原因",
    "tags": ["标签1", "标签2", "标签3"]
  }

  标签应该描述表情的内容、情绪、角色特征等，方便后续检索使用。

# 最大维护的表情包数量
# 超过后不再自动偷图
max_stickers: 100

# 自动清理配置
cleanup_interval_hours: 1  # 清理间隔（小时），每隔多久执行一次清理
cleanup_count: 5           # 每次清理数量，删除调用次数最少的表情包数量
